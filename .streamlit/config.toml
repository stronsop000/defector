# Streamlit theme — Defector editorial palette.
# Warm cream background, deep ink, terracotta accent. Reads more like
# a publication than a SaaS dashboard.

[theme]
base = "light"
primaryColor = "#b8443a"             # terracotta accent (sparingly)
backgroundColor = "#fdfaf3"           # warm cream — newsprint feel
secondaryBackgroundColor = "#f5efe1"  # slightly deeper cream for sidebars/cards
textColor = "#1a1a1a"                 # deep ink
font = "serif"

[client]
toolbarMode = "minimal"
showErrorDetails = false

[browser]
gatherUsageStats = false

name: Weekly refresh

# Public proof that this is a real pipeline that runs on a schedule, not a
# one-shot script. Adjust schedule as needed. The cron is in UTC.

on:
  schedule:
    - cron: "0 13 * * MON"   # Mondays 13:00 UTC = 8:00 CT / 9:00 ET
  workflow_dispatch:         # also runnable manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Scrape
        run: python -m src.scrape --cap 500
      - name: Classify
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.classify
      - name: Synthesize memo + copy
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m src.synthesize
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: defector-outputs-${{ github.run_number }}
          path: |
            data/reviews.duckdb
            outputs/memos/
            outputs/copy/
          retention-days: 30

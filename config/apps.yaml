# App universe for Parent Feedback.
#
# To add an app: append a new entry below with name + category. Run
# `python -m scripts.resolve_app_ids --interactive` to auto-fill IDs (review
# the candidates — store search is noisy).
#
# Categories:
#   kinedu          - Kinedu itself (control)
#   competitor      - Direct competitors: development activity / milestone apps
#   tracker         - Adjacent: feeding/sleep/diaper logging apps
#   early_education - Kids' content / curriculum
#   brand_product   - Brand-companion apps for physical baby products
#                     (the "baby products in general" segment — reviews
#                     talk about the product, not the app)
#   pregnancy       - Pregnancy-stage apps (prior journey)
#   latam_specific  - Apps with significant LatAm presence
#
# Dropped during cleanup:
#   Playfully - unpublished from Play Store Dec 2021, no longer fetchable
#   Bobbie    - no consumer app (formula subscription only)
#   BabyCenter Brasil - uses the same global app as US BabyCenter; one entry covers both

apps:
  # ============ KINEDU (control) ============
  - name: Kinedu
    category: kinedu
    play_store_id: com.kinedu.appkinedu
    app_store_id: 741277284

